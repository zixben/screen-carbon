$(".login").on("click", function () {
    var formData = $('form').serializeArray();
    var requestData = {};
    
    $.each(formData, function(index, field){
        requestData[field.name] = field.value;
    });

    console.log(server);
    $.ajax({
        method: "POST",
        url: server + "/user/login",
        data: JSON.stringify(requestData),
        contentType: "application/json;charset=UTF-8", // Update content type
        success: function (resp) {
            if (resp && resp.account === "admin") {
                window.location.href = server + "/main.html";
            } else {
                alert("Login Successfully!");
                window.location.href = server + "/index.html";
            }
            window.localStorage.setItem("user", JSON.stringify(resp));
        }
    });
});
