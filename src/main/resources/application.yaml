server:
  port: 8081

spring:
  config:
    import:
      - optional:classpath:.env[.properties]
      - optional:file:src/main/resources/application-local.yaml

  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.mariadb.jdbc.Driver}

  mail:
    host: ${SPRING_MAIL_HOST:mail-relay.gla.ac.uk}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:screencarbontest@glasgow.ac.uk}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}

  web:
    resources:
      cache:
        cachecontrol:
          max-age: ${SPRING_WEB_RESOURCES_CACHE_MAX_AGE:1d}
          cache-public: true

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

mybatis:
  mapper-locations: classpath:mybatis/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
  email:
    enabled: ${APP_EMAIL_ENABLED:true}
  password-recovery:
    log-link: ${PASSWORD_RECOVERY_LOG_LINK:false}
  tmdb:
    bearer-token: ${TMDB_BEARER_TOKEN:}
  cloudflare:
    web-analytics:
      enabled: ${CLOUDFLARE_WEB_ANALYTICS_ENABLED:false}
      token: ${CLOUDFLARE_WEB_ANALYTICS_TOKEN:}
      spa: ${CLOUDFLARE_WEB_ANALYTICS_SPA:false}
    analytics:
      enabled: ${CLOUDFLARE_ANALYTICS_ENABLED:false}
      account-id: ${CLOUDFLARE_ANALYTICS_ACCOUNT_ID:}
      api-token: ${CLOUDFLARE_ANALYTICS_API_TOKEN:}
      site-tag: ${CLOUDFLARE_ANALYTICS_SITE_TAG:}
      request-host: ${CLOUDFLARE_ANALYTICS_REQUEST_HOST:}
      lookback-days: ${CLOUDFLARE_ANALYTICS_LOOKBACK_DAYS:7}
      cache-seconds: ${CLOUDFLARE_ANALYTICS_CACHE_SECONDS:300}
