server:
  port: 8081

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:src/main/resources/application-local.yaml

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

mybatis:
  mapper-locations: classpath:mybatis/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  email:
    enabled: ${APP_EMAIL_ENABLED:true}
  password-recovery:
    log-link: ${PASSWORD_RECOVERY_LOG_LINK:false}
  tmdb:
    bearer-token: ${TMDB_BEARER_TOKEN:}
  analytics:
    geo:
      enabled: ${APP_ANALYTICS_GEO_ENABLED:true}
      country-header: ${APP_ANALYTICS_COUNTRY_HEADER:CF-IPCountry}
      region-header: ${APP_ANALYTICS_REGION_HEADER:X-App-Region}
