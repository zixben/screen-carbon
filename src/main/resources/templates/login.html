<!DOCTYPE html>
<html lang="en">

<head>
	<!-- Required meta tags -->
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<title>Login</title>
	<!-- font awesome -->
	<link rel="stylesheet" href="assets/css/all.min.css" />
	<!-- bootstraph -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- swiper js -->
	<link rel="stylesheet" href="assets/css/swiper-bundle.min.css" />
	<!-- Fancy Box -->
	<link rel="stylesheet" href="assets/css/jquery.fancybox.min.css" />
	<!-- Select -->
	<link rel="stylesheet" href="assets/css/select2.min.css" />
	<!-- User's CSS Here -->
	<link rel="stylesheet" href="assets/css/style.css" />

	<style>
		#logo {
			width: 15rem;
		}
	</style>
	<th:block th:replace="~{fragments/resources :: cloudflare-web-analytics}"></th:block>
</head>

<body>
	<!-- Contact Page Start -->
	<section class="p-0 bg-color">
		<div class="full-page__wrapper">
			<div class="full-page__image">

				<img src="/assets/images/comming-soon.jpg" alt="comming-soon" />
				<div class="contact__overlay">
					<div class="contact__info">
						<h2 class="section__title">Login to see your screen carbon ratings!</h2>

						<div class="contact__meta">


						</div>
					</div>
				</div>
			</div>
			<div class="full-page__inner">
				<div id="loginForm" class="full-page__content">
					<div class="full-page__logo">
						<a href="/">
							<img id="logo" src="/assets/images/logo/LOGO_V3-BLACK_(NO_TEXT).png" alt="logo" />
						</a>
					</div>
					<div class="form__inner">
						<form action="#" class="form__wrapper p-0">
							<h2 class="popup__title">Welcome Back</h2>
							<div class="form-group">
								<label for="username">Username</label>
								<input type="text" name="username" id="username" class="form-control" required
									data-error="Please enter account" placeholder="Enter your account" />
							</div>
							<div class="form-group">
								<label for="password">Password</label>
								<input type="password" name="password" id="password" class="form-control" required=""
									data-error="Please enter password" placeholder="Password" />
							</div>
							<div class="form-group">
								<label for="code">Code (Case sensitive)</label>
								<input type="text" name="code" id="code" style="width: 325px;float: left;"
									class="form-control" required="true"
									data-error="Please enter code, click to change the picture！" placeholder="code" />
								<span><img id="imgpw"
										style="width: 170px; margin-left:10px; margin-top:2px; border:2px solid #babbbc;float: left;"
										src="" alt="Click to change"></span>
							</div>
							<input type="hidden" th:name="_csrf" th:value="${csrfToken.token}" />
							<div class="submit__btn" style="padding-top: 70px;">
								<button type="button" class="btn btn-primary mt-0 w-100 login">Login</button>

							</div>
							<div class="account__desc">
								<div class="account__meta">
									Don’t have an account?
									<a href="/signup">Sign up</a>

									<a href="#" id="forgotPasswordLink" class="d-block mt-3">Forgot Password?</a>

								</div>
								<a href="/privacy-notice"
									class="d-block mt-3">Privacy Policy
								</a>
							</div>
						</form>
					</div>
				</div>

				<div id="passwordRecoveryForm" class="form-container d-none full-page__content">
					<h2>Password Recovery</h2>
					<form id="passwordRecoveryForm" class="form__wrapper">
						<div class="mb-3 form-group">
							<label for="email" class="form-label">Enter your email address</label>
							<input type="email" class="form-control" id="email" placeholder="Email" required>
						</div>
						<input type="hidden" th:name="_csrf" th:value="${csrfToken.token}" />
						<button type="submit" class="btn btn-primary">Submit</button>
					</form>
					<div id="responseMessage" class="mt-3"></div>
					<a href="#" id="backToLoginLink" class="d-block mt-3">Back to Login</a>
				</div>
			</div>
		</div>
	</section>
	<!-- Contact Page End -->


	<!-- Scroll-top -->
	<button class="scroll-top scroll-to-target" data-target="html">scroll</button>
	<!-- Scroll-top-end-->

	<!-- JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
		crossorigin="anonymous"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script src="assets/js/jquery.fancybox.min.js"></script>
	<script src="assets/js/counterup.min.js"></script>
	<script src="assets/js/jquery.waypoints.js"></script>
	<script src="assets/js/select2.min.js"></script>
	<script src="assets/js/swiper-bundle.min.js"></script>
	<script src="assets/js/scripts.js"></script>
	<script src="assets/js/server.js"></script>
	<script>
		$(document).ready(function () {
			function validateLoginForm() {
				var isValid = true;

				var username = $('#username').val().trim();
				var password = $('#password').val().trim();
				var code = $('#code').val().trim();

				if (username.length === 0) {
					showError('#username', 'Please enter your username.');
					isValid = false;
				} else {
					removeError('#username');
				}

				if (password.length === 0) {
					showError('#password', 'Please enter your password.');
					isValid = false;
				} else {
					removeError('#password');
				}

				if (code.length === 0) {
					showError('#code', 'Please enter the code.');
					isValid = false;
				} else {
					removeError('#code');
				}

				return isValid;
			}

			function showError(selector, message) {
				$(selector).next('.error').remove();
				$(selector).after(`<div class="error" style="color:red;">${message}</div>`);
			}

			function removeError(selector) {
				$(selector).next('.error').remove();
			}

			var csrfToken = $('input[name="_csrf"]').val();

			$(".login").on("click", function (e) {
				e.preventDefault();

				if (!validateLoginForm()) {
					return;
				}

				var formDataArray = $('form').serializeArray();
				var formDataObj = {};
				$.each(formDataArray, function (i, field) {
					formDataObj[field.name] = field.value;
				});

				var formDataJson = JSON.stringify(formDataObj);

				$.ajax({
					type: "POST",
					url: server + "/user/login",
					data: formDataJson,
					contentType: "application/json;charset=UTF-8",
					headers: {
						'X-CSRF-TOKEN': csrfToken
					},
					success: function (resp) {
						if (resp.role === "ADMIN") {
							alert(resp.message);
							window.location.href = server + "/admin";

						} else {

							alert(resp.message);
							window.location.href = server + "/";
						}

					},
					error: function (jqXHR, textStatus, errorThrown) {
						var response = jqXHR.responseJSON;
						if (response && response.message) {
							alert(response.message);
						} else {
							alert("An unexpected error occurred.");
						}
					}
				});
			});

			$("#imgpw").on("click", function () {
				var date = new Date().getMilliseconds();
				$("#imgpw").attr("src", server + "/user/getCode?" + date);
			});

			// Set initial captcha image
			$("#imgpw").attr("src", server + "/user/getCode");

			// Show password recovery form when "Forgot Password?" is clicked
			$('#forgotPasswordLink').on('click', function (e) {
				e.preventDefault();
				$('#loginForm').addClass('d-none'); // Hide the login form
				$('#passwordRecoveryForm').removeClass('d-none'); // Show the password recovery form
			});

			// Show login form when "Back to Login" is clicked
			$('#backToLoginLink').on('click', function (e) {
				e.preventDefault();
				$('#passwordRecoveryForm').addClass('d-none'); // Hide the password recovery form
				$('#loginForm').removeClass('d-none'); // Show the login form
			});

			// Handle password recovery form submission
			$('#passwordRecoveryForm').on('submit', function (e) {
				e.preventDefault();
				const email = $('#email').val();

				$.ajax({
					type: 'POST',
					url: server + '/user/password-recovery',
					contentType: "application/json;",
					data: JSON.stringify({email: email}),
					headers: {
						'X-CSRF-TOKEN': csrfToken  // Add CSRF token to the request headers
					},
					success: function (response) {
						$('#responseMessage')
							.removeClass('d-none alert-danger')
							.addClass('alert alert-success')
							.text(response.message);
					},
					error: function (error) {
						const errorMessage = error.responseJSON && error.responseJSON.message
							? error.responseJSON.message
							: 'An error occurred. Please try again.';
						$('#responseMessage')
							.removeClass('d-none alert-success')
							.addClass('alert alert-danger')
							.text(errorMessage);
					}
				});
			});
		});


	</script>
</body>

</html>
