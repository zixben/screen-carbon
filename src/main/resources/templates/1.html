<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating Dashboard</title>
    <style>
        h1 {
            text-align: center;
            color: cornflowerblue;
        }

        #main, #main2 {
            margin-top: 3%;
            float: left;
            width: 50%;
            height: 360px;
        }

        #main3 {
            clear: both;
            margin: 3% auto 0;
            width: 90%;
            height: 360px;
        }

        .scoreResult {
            width: 90%;
            margin: 20px auto;
            padding: 10px;
            color: #019ecb;
            display: flex;
            justify-content: space-around;
        }

        .scoreResult p {
            text-align: center;
        }

        .scoreResult span {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>
    <h1>Rating Dashboard</h1>
    <div id="main"></div>
    <div id="main2"></div>
    <div id="main3"></div>
    <div class="scoreResult">
        <p>The Highest Average Rating: <span id="supreme">Loading...</span></p>
        <p>The Most Popular Movie/Show: <span id="hot">Loading...</span></p>
        <p>Total Distinct Rated Movies/Shows: <span id="total">Loading...</span></p>
    </div>

    <!-- Include the latest versions of axios and echarts -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const avgDataUrl = "/score/getAvgFraction";
            const countDataUrl = "/score/getCountFraction";
            const totalRatedUrl = "/score/getTotalRated";
            const geoTrafficUrl = "/admin/analytics/geo-traffic?days=30&limit=20";

            let avgData = {};
            let countData = {};
            let totalRated = 0;
            let geoTraffic = {};

            const fetchData = async (url) => {
                try {
                    const response = await axios.get(url);
                    return response.data;
                } catch (error) {
                    console.error(`Error fetching data from ${url}:`, error);
                    return null;
                }
            };

            const renderChart = (domId, options) => {
                const chartDom = document.getElementById(domId);
                if (!chartDom) return;
                const chart = echarts.init(chartDom);
                chart.setOption(options);
                return chart;
            };

            // Fetch Average Rating Data
            avgData = await fetchData(avgDataUrl);
            if (avgData) {
                const avgLabels = Array.isArray(avgData.avgX) ? avgData.avgX : [];
                const avgValues = Array.isArray(avgData.avgY) ? avgData.avgY : [];
                document.getElementById("supreme").innerText = avgLabels[0] || "No data";

                const avgOptions = {
                    title: { text: "Average Rating (%)" },
                    tooltip: { 
						trigger: "axis", 
						formatter: function (params) {
            				return `${params[0].name}: ${params[0].value}%`; // Multiply value by 10
        				}
        			},
                    xAxis: { type: "category", data: avgLabels, name: "Movie/Show" },
                    yAxis: { 
						type: "value", 
						name: "Average Rating (%)", 
						axisLabel: {
            				formatter: '{value}%',
        				}, 
        			},
                    series: [{
                        name: "Highest Rating (%)",
                        type: "line",
                        data: avgValues.map(y => y ? (y * 10).toFixed(2) : 0), // Multiply by 10 and handle nulls
                        smooth: true,
                        markPoint: { data: [{ type: "max", name: "Highest" }, { type: "min", name: "Lowest" }] },
                        markLine: { data: [{ type: "average", name: "Average" }] }
                    }]
                };
                renderChart("main", avgOptions);
            }

            // Fetch Popularity Data
            countData = await fetchData(countDataUrl);
            if (countData) {
                const countLabels = Array.isArray(countData.countX) ? countData.countX : [];
                const countValues = Array.isArray(countData.countY) ? countData.countY : [];
                document.getElementById("hot").innerText = countLabels[0] || "No data";
                const countOptions = {
                    title: { text: "Popularity (Count)" },
                    tooltip: { trigger: "axis" },
                    xAxis: { type: "category", data: countLabels, name: "Movie/Show" },
                    yAxis: { type: "value", name: "Number of Ratings" },
                    series: [{
                        name: "Number of Ratings",
                        type: "bar",
                        data: countValues,
                        markPoint: { data: [{ type: "max", name: "Most Popular" }, { type: "min", name: "Least Popular" }] },
                        markLine: { data: [{ type: "average", name: "Average" }] }
                    }]
                };
                renderChart("main2", countOptions);
            }

            // Fetch Total Rated Movies/Shows
            totalRated = await fetchData(totalRatedUrl);
            if (totalRated) {
                document.getElementById("total").innerText = totalRated.count || 0;
            }

            geoTraffic = await fetchData(geoTrafficUrl);
            if (geoTraffic) {
                const trafficItems = Array.isArray(geoTraffic.items) ? geoTraffic.items : [];
                const geoSeriesData = trafficItems.map(item => ({
                    name: formatGeoLabel(item),
                    value: item.requestCount || 0
                }));
                const geoOptions = {
                    title: { text: "Geographical Traffic, Last 30 Days" },
                    tooltip: {
                        trigger: "item",
                        formatter: "{b}: {c} ({d}%)"
                    },
                    series: [{
                        name: "Page views",
                        type: "pie",
                        radius: "65%",
                        data: geoSeriesData.length ? geoSeriesData : [{ name: "No data", value: 0 }]
                    }]
                };
                renderChart("main3", geoOptions);
            }

            // Handle resizing of charts
            window.addEventListener("resize", () => {
                const avgChart = echarts.getInstanceByDom(document.getElementById("main"));
                const countChart = echarts.getInstanceByDom(document.getElementById("main2"));
                const geoChart = echarts.getInstanceByDom(document.getElementById("main3"));
                if (avgChart) avgChart.resize();
                if (countChart) countChart.resize();
                if (geoChart) geoChart.resize();
            });

            function formatGeoLabel(item) {
                const countryCode = item.countryCode === "ZZ" ? "Unknown" : item.countryCode;
                const region = item.region && item.region !== "Unknown" ? ` - ${item.region}` : "";
                return `${countryCode}${region}`;
            }
        });
    </script>
</body>

</html>
