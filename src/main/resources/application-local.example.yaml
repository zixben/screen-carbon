spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/thunbergtest?characterEncoding=utf8&useSSL=false&serverTimezone=Europe/London&rewriteBatchedStatements=true
    hikari:
      driver-class-name: org.mariadb.jdbc.Driver
      username: YOUR_LOCAL_DB_USER
      password: YOUR_LOCAL_DB_PASSWORD

  mail:
    host: mail-relay.gla.ac.uk
    port: 25
    username: screencarbontest@glasgow.ac.uk
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8081}
  email:
    enabled: ${APP_EMAIL_ENABLED:false}
  password-recovery:
    log-link: ${PASSWORD_RECOVERY_LOG_LINK:true}
  tmdb:
    bearer-token: ${TMDB_BEARER_TOKEN:}
  cloudflare:
    web-analytics:
      enabled: ${CLOUDFLARE_WEB_ANALYTICS_ENABLED:false}
      token: ${CLOUDFLARE_WEB_ANALYTICS_TOKEN:}
      spa: ${CLOUDFLARE_WEB_ANALYTICS_SPA:false}
    analytics:
      enabled: ${CLOUDFLARE_ANALYTICS_ENABLED:false}
      account-id: ${CLOUDFLARE_ANALYTICS_ACCOUNT_ID:}
      api-token: ${CLOUDFLARE_ANALYTICS_API_TOKEN:}
      site-tag: ${CLOUDFLARE_ANALYTICS_SITE_TAG:}
      request-host: ${CLOUDFLARE_ANALYTICS_REQUEST_HOST:}
      lookback-days: ${CLOUDFLARE_ANALYTICS_LOOKBACK_DAYS:7}
      cache-seconds: ${CLOUDFLARE_ANALYTICS_CACHE_SECONDS:300}
