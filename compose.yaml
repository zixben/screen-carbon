services:
  db:
    image: mariadb:11
    container_name: screen-carbon-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-thunbergtest}
      MARIADB_USER: ${MARIADB_USER:-screen_carbon}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?Set MARIADB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?Set MARIADB_ROOT_PASSWORD in .env}
    ports:
      - "3307:3306"
    volumes:
      - screen_carbon_mariadb:/var/lib/mysql
  phpmyadmin:
    image: phpmyadmin
    container_name: screen-carbon-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8082:80"
    depends_on:
      - db
volumes:
  screen_carbon_mariadb:
